<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYC Events This Week</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F5F0E8;
      --surface:   #FDFBF7;
      --surface2:  #EDE8DF;
      --border:    #D9D2C5;
      --text:      #3A3028;
      --muted:     #8C8279;
      --accent:    #8E7BAD;
      --accent-bg: #F0EDF6;
    }

    body {
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      padding-bottom: 16px;
    }

    .header-title {
      flex: 1;
    }

    .header-title h1 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.7rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1.2;
      color: var(--text);
    }

    .header-title p {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
      font-weight: 300;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.75rem;
      font-family: "Inter", sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .refresh-btn {
      padding: 6px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 0.8rem;
      font-family: "Inter", sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .refresh-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
    .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 0;
      margin-top: 4px;
    }

    .tab-btn {
      padding: 10px 20px;
      border: none;
      background: transparent;
      font-family: "Inter", sans-serif;
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 500;
    }

    /* ── Loading ── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 80px 32px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Views ── */
    #view-events, #view-sources { padding: 28px 32px; }

    /* ── Events: day sections ── */
    #week { display: flex; flex-direction: column; gap: 36px; }

    .day-section {}

    .day-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .day-name {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--text);
    }

    .day-date { font-size: 0.8rem; color: var(--muted); }

    .event-count {
      margin-left: auto;
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 999px;
    }

    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 10px;
    }

    .empty-day {
      color: var(--muted);
      font-size: 0.82rem;
      font-style: italic;
    }

    /* ── Event card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 12px rgba(142, 123, 173, 0.1);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .card-title {
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1.35;
      color: var(--text);
    }

    .cat-badge {
      flex-shrink: 0;
      font-size: 0.68rem;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 999px;
      letter-spacing: 0.02em;
    }

    .card-meta { display: flex; flex-direction: column; gap: 3px; }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .card-desc {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .card-source {
      font-size: 0.72rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 7px;
      margin-top: 2px;
    }

    /* ── Sources view ── */
    .sources-intro {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .sources-group { margin-bottom: 32px; }

    .sources-group-title {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sources-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
    }

    .source-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .source-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .source-name {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
    }

    .status-badge {
      flex-shrink: 0;
      font-size: 0.66rem;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 999px;
      letter-spacing: 0.03em;
    }
    .status-active   { background: #EAF4EC; color: #3D7A4A; }
    .status-blocked  { background: #FAEAEA; color: #A03D3D; }
    .status-js-only  { background: #FDF4E7; color: #8C6428; }

    .source-note {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .source-url {
      font-size: 0.73rem;
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
      opacity: 0.85;
    }
    .source-url:hover { opacity: 1; text-decoration: underline; }

    /* ── Status bar ── */
    #status-bar {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      padding: 10px;
      letter-spacing: 0.01em;
    }

    .hidden { display: none !important; }

    @media (max-width: 600px) {
      header { padding: 16px 16px 0; }
      #view-events, #view-sources { padding: 20px 16px; }
      .events-grid, .sources-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-title">
      <h1>NYC Events This Week</h1>
      <p>Wellness · Yoga · Spirituality · Community</p>
    </div>
    <div class="header-actions">
      <div class="filters" id="filters"></div>
      <button class="refresh-btn" id="refreshBtn" onclick="refresh()">Refresh</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('events')">This Week</button>
    <button class="tab-btn" onclick="showTab('sources')">Sources</button>
  </div>
</header>

<div id="loading">
  <div class="spinner"></div>
  <div>Gathering events across NYC…</div>
</div>

<div id="view-events" class="hidden">
  <div id="week"></div>
</div>

<div id="view-sources" class="hidden">
  <p class="sources-intro">
    Events are scraped from <span id="source-count">—</span> sites nightly at 3 AM ET.
    Sources marked <strong>JS-only</strong> require a browser to render and are not currently scraped.
    Sources marked <strong>blocked</strong> return HTTP 403.
  </p>
  <div id="sources-list"></div>
</div>

<div id="status-bar" class="hidden"></div>

<script>
  const CATEGORY_COLORS = {{ category_colors | tojson }};

  let allEvents = [];
  let allSources = [];
  let activeCategory = "all";
  let activeTab = "events";

  const DAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  function catColor(cat) {
    return CATEGORY_COLORS[cat] || "#8E7BAD";
  }

  function formatDayHeader(dateStr) {
    const [y, m, d] = dateStr.split("-").map(Number);
    const date = new Date(y, m - 1, d);
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.round((date - today) / 86400000);
    const label = diff === 0 ? "Today" : diff === 1 ? "Tomorrow" : DAY_NAMES[date.getDay()];
    return { label, sub: `${MONTH_NAMES[m-1]} ${d}` };
  }

  function esc(s) {
    if (!s) return "";
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function icon(type) {
    if (type === "time") return `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
    if (type === "loc")  return `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
    return "";
  }

  function parseTime(t) {
    if (!t) return 9999;
    const m = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
    if (!m) return 9999;
    let h = parseInt(m[1]), min = parseInt(m[2]);
    const ap = m[3].toUpperCase();
    if (ap === "PM" && h !== 12) h += 12;
    if (ap === "AM" && h === 12) h = 0;
    return h * 60 + min;
  }

  // ── Tab switching ──────────────────────────────────────────────────────────

  function showTab(tab) {
    activeTab = tab;
    document.querySelectorAll(".tab-btn").forEach((b, i) => {
      b.classList.toggle("active", (i === 0 && tab === "events") || (i === 1 && tab === "sources"));
    });
    document.getElementById("view-events").classList.toggle("hidden", tab !== "events");
    document.getElementById("view-sources").classList.toggle("hidden", tab !== "sources");
    document.getElementById("filters").classList.toggle("hidden", tab !== "events");

    if (tab === "sources" && allSources.length === 0) {
      loadSources();
    }
  }

  // ── Events view ────────────────────────────────────────────────────────────

  function renderFilters(events) {
    const cats = [...new Set(events.map(e => e.category))].sort();
    const el = document.getElementById("filters");
    el.innerHTML = `<button class="filter-btn ${activeCategory==="all"?"active":""}" data-cat="all">All</button>`;
    cats.forEach(cat => {
      const color = catColor(cat);
      const active = activeCategory === cat;
      const btn = document.createElement("button");
      btn.className = "filter-btn" + (active ? " active" : "");
      btn.dataset.cat = cat;
      btn.textContent = cat;
      if (active) { btn.style.background = color; btn.style.borderColor = color; btn.style.color = "#fff"; }
      el.appendChild(btn);
    });
    el.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        activeCategory = btn.dataset.cat;
        renderWeek(allEvents, window._week);
      });
    });
  }

  function renderEventCard(evt) {
    const color = catColor(evt.category);
    const url = evt.event_url || evt.source_url || "#";
    return `
      <a class="card" href="${esc(url)}" target="_blank" rel="noopener">
        <div class="card-top">
          <div class="card-title">${esc(evt.title)}</div>
          <span class="cat-badge" style="background:${color}18;color:${color}">${esc(evt.category)}</span>
        </div>
        <div class="card-meta">
          ${evt.time     ? `<div class="meta-row">${icon("time")} ${esc(evt.time)}</div>` : ""}
          ${evt.location ? `<div class="meta-row">${icon("loc")} ${esc(evt.location)}</div>` : ""}
        </div>
        ${evt.description ? `<div class="card-desc">${esc(evt.description)}</div>` : ""}
        <div class="card-source">${esc(evt.source)}</div>
      </a>`;
  }

  function renderWeek(events, week) {
    window._week = week;
    renderFilters(events);

    const filtered = activeCategory === "all" ? events : events.filter(e => e.category === activeCategory);
    const byDay = {};
    week.forEach(d => byDay[d] = []);
    filtered.forEach(e => { if (byDay[e.date] !== undefined) byDay[e.date].push(e); });
    week.forEach(d => byDay[d].sort((a, b) => parseTime(a.time) - parseTime(b.time)));

    const container = document.getElementById("week");
    container.innerHTML = "";
    week.forEach(dateStr => {
      const { label, sub } = formatDayHeader(dateStr);
      const dayEvents = byDay[dateStr];
      const sec = document.createElement("section");
      sec.className = "day-section";
      sec.innerHTML = `
        <div class="day-header">
          <span class="day-name">${label}</span>
          <span class="day-date">${sub}</span>
          <span class="event-count">${dayEvents.length}</span>
        </div>
        <div class="events-grid">
          ${dayEvents.length === 0
            ? `<div class="empty-day">No events found</div>`
            : dayEvents.map(renderEventCard).join("")}
        </div>`;
      container.appendChild(sec);
    });
  }

  // ── Sources view ───────────────────────────────────────────────────────────

  function renderSources(sources) {
    document.getElementById("source-count").textContent = sources.length;

    const grouped = {};
    sources.forEach(s => {
      if (!grouped[s.category]) grouped[s.category] = [];
      grouped[s.category].push(s);
    });

    const STATUS_LABELS = { active: "Active", blocked: "Blocked", "js-only": "JS-only" };
    const container = document.getElementById("sources-list");
    container.innerHTML = Object.entries(grouped).map(([cat, items]) => {
      const color = catColor(cat);
      const cards = items.map(s => `
        <div class="source-card">
          <div class="source-card-top">
            <span class="source-name">${esc(s.name)}</span>
            <span class="status-badge status-${s.status}">${STATUS_LABELS[s.status] || s.status}</span>
          </div>
          <div class="source-note">${esc(s.note || "")}</div>
          <a class="source-url" href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.url)}</a>
        </div>`).join("");

      return `
        <div class="sources-group">
          <div class="sources-group-title">
            <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color}"></span>
            ${esc(cat)}
          </div>
          <div class="sources-grid">${cards}</div>
        </div>`;
    }).join("");
  }

  async function loadSources() {
    try {
      const r = await fetch("/api/sources");
      allSources = await r.json();
      renderSources(allSources);
    } catch (e) {
      document.getElementById("sources-list").innerHTML =
        `<p style="color:var(--muted)">Failed to load sources: ${e.message}</p>`;
    }
  }

  // ── Events loading ─────────────────────────────────────────────────────────

  async function loadEvents(endpoint = "/api/events") {
    document.getElementById("loading").classList.remove("hidden");
    document.getElementById("view-events").classList.add("hidden");
    document.getElementById("status-bar").classList.add("hidden");
    document.getElementById("refreshBtn").disabled = true;

    try {
      const method = endpoint === "/api/refresh" ? "POST" : "GET";
      const res = await fetch(endpoint, { method });
      const data = await res.json();
      allEvents = data.events;
      renderWeek(allEvents, data.week);
      document.getElementById("loading").classList.add("hidden");
      document.getElementById("view-events").classList.remove("hidden");
      const sb = document.getElementById("status-bar");
      sb.textContent = `${allEvents.length} events · ${data.cached ? "from cache" : "freshly scraped"}`;
      sb.classList.remove("hidden");
    } catch (err) {
      document.getElementById("loading").innerHTML =
        `<div style="color:#A03D3D;font-size:.85rem">Error loading events: ${err.message}</div>`;
    } finally {
      document.getElementById("refreshBtn").disabled = false;
    }
  }

  function refresh() { loadEvents("/api/refresh"); }

  // Init
  showTab("events");
  loadEvents();
</script>
</body>
</html>
